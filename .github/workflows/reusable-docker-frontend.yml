name: reusable-docker

on: 
    workflow_call:
        inputs:
            image: 
                description: This is the docker image
                type: string
                required: true
            tags:
                description: This is the docker image tag
                type: string
                required: true
        secrets:
            docker_username: 
                description: This is the dockerhub username
                required: true
            docker_token: 
                description: This is the dockerhub token (password)
                required: true
        outputs: 
            my_output:
                description: This is the output section of the workflow 
                value: ${{ jobs.docker_image.outputs.status }}

jobs:
    docker_image:
        runs-on: ubuntu-latest
        outputs:
            status: ${{ steps.Build_and_push.outputs.digest }}
        steps:
            - name: Checkout the code
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v4
              with: 
                username: ${{ secrets.docker_username }}
                password: ${{ secrets.docker_token }}

            - name: Build and push the image
              id: Build_and_push
              uses: docker/build-push-action@v6
              with: 
                context: ./frontend
                file: ./frontend/Dockerfile
                push: true
                tags: |
                    ${{ secrets.docker_username }}/${{ inputs.image }}:latest
                    ${{ secrets.docker_username }}/${{ inputs.image }}:${{ inputs.tags }}
              
    