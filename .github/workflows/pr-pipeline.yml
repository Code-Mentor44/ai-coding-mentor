name: pr-pipeline

on:
    pull_request:
        branches: [main]
        types:
            - opened
            - synchronize

jobs:
    pr-pipe:
        uses: ./.github/workflows/reusable-build-test.yml
        with:
            run_tests: true

    pr-comment:
        runs-on: ubuntu-latest
        needs: pr-pipe
        steps:
            - name: Print the summary!
              run: |
                  echo "PR check passed for ${{ github.head_ref }}"