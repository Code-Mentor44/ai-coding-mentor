name: health-check

on:
    workflow_dispatch:
    schedule:
        - cron: '0 */12 * * *'

jobs:
    docker_image:
        runs-on: ubuntu-latest
        steps:
            - name: Docker login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Pull your latest Docker image
              run: |
                  docker pull ${{ secrets.DOCKER_USERNAME }}/coding-mentor-ai-backend:latest
                  docker pull ${{ secrets.DOCKER_USERNAME }}/coding-mentor-ai-frontend:latest

            - name: Run the container in detached mode
              run: |
                  docker run -d --name health-check-frontend-container -p 5173:5173 ${{ secrets.DOCKER_USERNAME }}/coding-mentor-ai-frontend:latest
                  docker run -d --name health-check-backend-container -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/coding-mentor-ai-backend:latest

            - name: Wait 5 seconds, then curl the backend health endpoint
              run: |
                  sleep 5
                  if curl -f http://localhost:8000/health; then
                      echo "BACKEND_STATUS=PASSED" >> $GITHUB_ENV
                      echo "HEALTH CHECK PASSED!"
                  else
                      echo "BACKEND_STATUS=FAILED" >> $GITHUB_ENV
                      echo "HEALTH CHECK FAILED!"
                      exit 1
                  fi
            
            - name: Wait 5 seconds, then curl the frontend health endpoint
              run: |
                  sleep 5
                  if curl -f http://localhost:5173/; then
                      echo "FRONTEND_STATUS=PASSED" >> $GITHUB_ENV
                      echo "HEALTH CHECK PASSED!"
                  else
                      echo "FRONTEND_STATUS=FAILED" >> $GITHUB_ENV
                      echo "HEALTH CHECK FAILED!"
                      exit 1
                  fi

            - name: Stop and remove the container
              if: always()
              run: |
                  docker stop health-check-frontend-container || true
                  docker stop health-check-backend-container  || true
                  docker rm health-check-frontend-container || true
                  docker rm health-check-backend-container  || true

            - name: creates a summary
              if: always()
              run: |
                  echo "The Summary of the Workflow" >> $GITHUB_STEP_SUMMARY
                  echo "**Backend-Image** ${{ secrets.DOCKER_USERNAME }}/coding-mentor-ai-backend:latest" >> $GITHUB_STEP_SUMMARY
                  echo "**Frontend-Image** ${{ secrets.DOCKER_USERNAME }}/coding-mentor-ai-frontend:latest" >> $GITHUB_STEP_SUMMARY
                  echo "**Backend-Status** ${{ env.BACKEND_STATUS || 'FAILED' }}" >> $GITHUB_STEP_SUMMARY
                  echo "**Frontend-Status** ${{ env.FRONTEND_STATUS || 'FAILED' }}" >> $GITHUB_STEP_SUMMARY
                  echo "**Date** $(date)" >> $GITHUB_STEP_SUMMARY